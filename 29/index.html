<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Spacetown!</title>
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.5.0/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-randomizer-components@3.0.2/dist/aframe-randomizer-components.min.js"></script>
    <script src="https://unpkg.com/aframe-entity-generator-component@3.0.1/dist/aframe-entity-generator-component.min.js"></script>

    <style>
        #audio-gate {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(24, 6, 32, 0.92);
            color: #f4d9ff;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            cursor: pointer;
            padding: 24px;
        }
    </style>

    <script>
        /* ============================================================
           SPACETOWN — psychedelic mushroom edition + instanced heads.
           ============================================================ */

        /* funky-transform kept from before (unused now, but yours) */
        AFRAME.registerComponent('funky-transform', {
            schema: {
                spinZ: { default: 3 }, xAmp: { default: 0.4 }, yAmp: { default: 0.4 },
                xPeriod: { default: 5 }, yPeriod: { default: 15 }
            },
            init: function () {
                var s = this.el.object3D.scale;
                this.base = { x: s.x, y: s.y, z: s.z };
                this.el.object3D.rotation.order = 'XYZ';
            },
            tick: function (time, dt) {
                var d = this.data, o = this.el.object3D, sec = time / 1000;
                o.scale.x = this.base.x * (1 + d.xAmp * Math.sin(sec * 2 * Math.PI / d.xPeriod));
                o.scale.y = this.base.y * (1 + d.yAmp * Math.sin(sec * 2 * Math.PI / d.yPeriod));
                o.scale.z = this.base.z;
                o.rotation.z += THREE.MathUtils.degToRad(d.spinZ) * (dt / 1000);
            }
        });

        /* ============================================================
           scatter-instances
           ------------------------------------------------------------
           Instances a GLTF (loaded via the entity's own gltf-model) N
           times as one InstancedMesh per source mesh — so N heads cost
           ~1 draw call each mesh, not N. Each instance gets its OWN:
             - position (random in areaMin..areaMax)
             - size (height ± heightVar, MEASURED not guessed)
             - Y spin speed & direction (±spin deg/sec)
             - scale "breathing" (amp/period/phase, all randomized)
             - vertical bob (amp/period/phase)
           All variation is transform-based, which is the only kind
           instancing can express. NOTE: instancing can't play per-
           instance skeletal animation — if head2 has a baked anim it
           renders static here. If you need the anim, say so and I'll
           give you a clone-based version (more draw calls).
           ============================================================ */
        AFRAME.registerComponent('scatter-instances', {
            dependencies: ['gltf-model'],
            schema: {
                count: { default: 40 },
                areaMin: { type: 'vec3', default: { x: -150, y: 6, z: -150 } },
                areaMax: { type: 'vec3', default: { x: 150, y: 90, z: 150 } },
                height: { default: 12 },        /* avg head height in WORLD units */
                heightVar: { default: 0.5 },    /* ± fraction of height */
                spin: { default: 40 },          /* max |Y spin| deg/sec */
                breatheAmp: { default: 0.25 },  /* max scale swing, ± fraction */
                bob: { default: 3 }             /* max vertical bob, world units */
            },

            init: function () {
                this.inst = [];
                this.dummy = new THREE.Object3D();
                this.el.addEventListener('model-loaded', this.build.bind(this));
            },

            build: function (e) {
                var model = e.detail.model;
                model.updateWorldMatrix(true, true);

                /* collect meshes, bake each world matrix into a geometry copy,
                   measure combined height for normalization */
                var src = [], box = new THREE.Box3();
                model.traverse(function (o) {
                    if (o.isMesh && o.geometry) {
                        o.updateWorldMatrix(true, false);
                        var g = o.geometry.clone();
                        g.applyMatrix4(o.matrixWorld);
                        src.push({ geo: g, mat: o.material });
                        g.computeBoundingBox();
                        box.union(g.boundingBox);
                    }
                });
                if (!src.length) { console.warn('scatter-instances: no meshes in model'); return; }

                var size = new THREE.Vector3(); box.getSize(size);
                this.baseHeight = size.y || 1;               /* native baked height */
                this.norm = this.data.height / this.baseHeight; /* -> world height */

                /* remove the single original model so only instances show */
                this.el.removeObject3D('mesh');

                var N = this.data.count, d = this.data, self = this;
                this.inst = src.map(function (s) {
                    var im = new THREE.InstancedMesh(s.geo, s.mat, N);
                    im.frustumCulled = false; /* instances span a big volume */
                    self.el.object3D.add(im);
                    return im;
                });

                /* per-instance behavior params */
                var rand = function (a, b) { return a + Math.random() * (b - a); };
                this.p = [];
                for (var i = 0; i < N; i++) {
                    this.p.push({
                        x: rand(d.areaMin.x, d.areaMax.x),
                        y: rand(d.areaMin.y, d.areaMax.y),
                        z: rand(d.areaMin.z, d.areaMax.z),
                        yaw: rand(0, Math.PI * 2),
                        spin: THREE.MathUtils.degToRad(rand(-d.spin, d.spin)),
                        sizeMul: this.norm * (1 + rand(-d.heightVar, d.heightVar)),
                        brAmp: rand(0, d.breatheAmp),
                        brPer: rand(4, 12),
                        brPh: rand(0, Math.PI * 2),
                        bobAmp: rand(0, d.bob),
                        bobPer: rand(5, 14),
                        bobPh: rand(0, Math.PI * 2)
                    });
                }
                this._seeded = true;
            },

            tick: function (time, dt) {
                if (!this._seeded) return;
                var t = time / 1000, dm = this.dummy, i, k, p, s, bob;
                for (i = 0; i < this.p.length; i++) {
                    p = this.p[i];
                    p.yaw += p.spin * (dt / 1000);
                    s = p.sizeMul * (1 + p.brAmp * Math.sin(2 * Math.PI * t / p.brPer + p.brPh));
                    bob = p.bobAmp * Math.sin(2 * Math.PI * t / p.bobPer + p.bobPh);
                    dm.position.set(p.x, p.y + bob, p.z);
                    dm.rotation.set(0, p.yaw, 0);
                    dm.scale.setScalar(s);
                    dm.updateMatrix();
                    for (k = 0; k < this.inst.length; k++) this.inst[k].setMatrixAt(i, dm.matrix);
                }
                for (k = 0; k < this.inst.length; k++) this.inst[k].instanceMatrix.needsUpdate = true;
            },

            remove: function () {
                var self = this;
                this.inst.forEach(function (im) {
                    self.el.object3D.remove(im);
                    im.geometry.dispose();
                });
                this.inst = [];
            }
        });


        AFRAME.registerSystem('acoustics', {
            init: function () {
                this.ctx = null;
                this.ready = false;
                this.zones = [];
                this.pending = [];
                this._v = new THREE.Vector3();
                this._q = new THREE.Quaternion();
                this._fwd = new THREE.Vector3();
                this._up = new THREE.Vector3();
                this._lastZoneUpdate = 0;

                var start = this.start.bind(this);
                var gate = document.getElementById('audio-gate');
                if (gate) gate.addEventListener('click', start);
                this.el.addEventListener('enter-vr', start);
                window.addEventListener('click', start, { once: true });
            },

            start: function () {
                if (this.ctx) { this.ctx.resume(); this._hideGate(); return; }
                var ctx = this.ctx = new (window.AudioContext || window.webkitAudioContext)();

                this.limiter = ctx.createDynamicsCompressor();
                this.limiter.threshold.value = -3;
                this.limiter.knee.value = 0;
                this.limiter.ratio.value = 20;
                this.limiter.attack.value = 0.003;
                this.limiter.release.value = 0.25;
                this.limiter.connect(ctx.destination);

                this.master = ctx.createGain();
                this.master.gain.value = 1.0;
                this.master.connect(this.limiter);

                this.dry = ctx.createGain();
                this.dry.gain.value = 1.0;
                this.dry.connect(this.master);

                this.reverbSend = ctx.createGain();
                this.reverbSend.gain.value = 1.0;

                this.ready = true;
                this.pending.forEach(function (fn) { fn(ctx); });
                this.pending = [];
                this._hideGate();
                ctx.resume();
            },

            _hideGate: function () {
                var gate = document.getElementById('audio-gate');
                if (gate) gate.style.display = 'none';
            },

            whenReady: function (fn) {
                if (this.ready) fn(this.ctx);
                else this.pending.push(fn);
            },

            registerZone: function (zone) { this.zones.push(zone); },

            tick: function (time) {
                if (!this.ready || !this.el.camera) return;

                var cam = this.el.camera;
                cam.getWorldPosition(this._v);
                cam.getWorldQuaternion(this._q);
                this._fwd.set(0, 0, -1).applyQuaternion(this._q);
                this._up.set(0, 1, 0).applyQuaternion(this._q);

                var L = this.ctx.listener, t = this.ctx.currentTime;
                if (L.positionX) {
                    var s = 0.02;
                    L.positionX.setTargetAtTime(this._v.x, t, s);
                    L.positionY.setTargetAtTime(this._v.y, t, s);
                    L.positionZ.setTargetAtTime(this._v.z, t, s);
                    L.forwardX.setTargetAtTime(this._fwd.x, t, s);
                    L.forwardY.setTargetAtTime(this._fwd.y, t, s);
                    L.forwardZ.setTargetAtTime(this._fwd.z, t, s);
                    L.upX.setTargetAtTime(this._up.x, t, s);
                    L.upY.setTargetAtTime(this._up.y, t, s);
                    L.upZ.setTargetAtTime(this._up.z, t, s);
                } else {
                    L.setPosition(this._v.x, this._v.y, this._v.z);
                    L.setOrientation(this._fwd.x, this._fwd.y, this._fwd.z,
                        this._up.x, this._up.y, this._up.z);
                }

                if (time - this._lastZoneUpdate < 100) return;
                this._lastZoneUpdate = time;

                var maxNonAmbient = 0, i, z, w;
                for (i = 0; i < this.zones.length; i++) {
                    z = this.zones[i];
                    if (!z.node || z.data.ambient) continue;
                    w = z.weightAt(this._v);
                    z._w = w;
                    if (w > maxNonAmbient) maxNonAmbient = w;
                }
                for (i = 0; i < this.zones.length; i++) {
                    z = this.zones[i];
                    if (!z.node) continue;
                    w = z.data.ambient ? (1 - maxNonAmbient) : z._w;
                    z.wetGain.gain.setTargetAtTime(w * z.data.wet, t, 0.25);
                }
            }
        });


        AFRAME.registerComponent('reverb-zone', {
            schema: {
                radius: { default: 5 }, fade: { default: 3 }, wet: { default: 0.6 },
                seconds: { default: 2.5 }, decay: { default: 2.5 }, tone: { default: 3000 },
                predelay: { default: 0.02 }, irSrc: { default: '' }, ambient: { default: false }
            },
            init: function () {
                this.node = null;
                this._w = 0;
                var self = this;
                var sys = this.el.sceneEl.systems.acoustics;
                sys.registerZone(this);
                sys.whenReady(function (ctx) {
                    self.node = ctx.createConvolver();
                    self.wetGain = ctx.createGain();
                    self.wetGain.gain.value = 0;
                    sys.reverbSend.connect(self.node);
                    self.node.connect(self.wetGain);
                    self.wetGain.connect(sys.master);
                    if (self.data.irSrc) {
                        fetch(self.data.irSrc)
                            .then(function (r) { return r.arrayBuffer(); })
                            .then(function (b) { return ctx.decodeAudioData(b); })
                            .then(function (buf) { self.node.buffer = buf; })
                            .catch(function (e) {
                                console.warn('reverb-zone: IR load failed, synthesizing.', e);
                                self.node.buffer = self.synthIR(ctx);
                            });
                    } else {
                        self.node.buffer = self.synthIR(ctx);
                    }
                });
                if (/[?&]debug/.test(location.search)) {
                    this.el.setAttribute('geometry',
                        'primitive: sphere; radius: ' + this.data.radius);
                    this.el.setAttribute('material',
                        'wireframe: true; color: #4fd; opacity: 0.35; transparent: true');
                }
            },
            synthIR: function (ctx) {
                var rate = ctx.sampleRate;
                var pre = Math.floor(rate * this.data.predelay);
                var len = Math.max(rate * 0.05, Math.floor(rate * this.data.seconds));
                var buf = ctx.createBuffer(2, pre + len, rate);
                var k = Math.exp(-2 * Math.PI * this.data.tone / rate);
                for (var ch = 0; ch < 2; ch++) {
                    var d = buf.getChannelData(ch), lp = 0;
                    for (var i = 0; i < len; i++) {
                        var white = Math.random() * 2 - 1;
                        lp = (1 - k) * white + k * lp;
                        d[pre + i] = lp * Math.pow(1 - i / len, this.data.decay);
                    }
                }
                return buf;
            },
            weightAt: function (worldPos) {
                var d = this.el.object3D.getWorldPosition(this._c || (this._c = new THREE.Vector3()))
                    .distanceTo(worldPos);
                if (d <= this.data.radius) return 1;
                if (this.data.fade <= 0) return 0;
                return Math.max(0, 1 - (d - this.data.radius) / this.data.fade);
            }
        });


        AFRAME.registerComponent('spatial-source', {
            schema: {
                src: { default: '' }, loop: { default: true }, volume: { default: 1.0 },
                send: { default: 0.6 }, refDistance: { default: 1.5 },
                rolloffFactor: { default: 1.5 }, maxDistance: { default: 100 }, bed: { default: false }
            },
            init: function () {
                var self = this;
                this._pos = new THREE.Vector3();
                var sys = this.system = this.el.sceneEl.systems.acoustics;
                var url = this.data.src;
                if (url && url[0] === '#') {
                    var elAsset = document.querySelector(url);
                    url = elAsset ? elAsset.getAttribute('src') : '';
                }
                if (!url) { console.warn('spatial-source: no src on', this.el); return; }
                sys.whenReady(function (ctx) {
                    fetch(url)
                        .then(function (r) {
                            if (!r.ok) throw new Error(r.status + ' ' + url);
                            return r.arrayBuffer();
                        })
                        .then(function (b) { return ctx.decodeAudioData(b); })
                        .then(function (buffer) { self.buildGraph(ctx, buffer); })
                        .catch(function (e) {
                            console.warn('spatial-source: could not load', url, e);
                        });
                });
            },
            buildGraph: function (ctx, buffer) {
                var d = this.data;
                this.srcNode = ctx.createBufferSource();
                this.srcNode.buffer = buffer;
                this.srcNode.loop = d.loop;
                this.gain = ctx.createGain();
                this.gain.gain.value = d.volume;
                this.sendGain = ctx.createGain();
                this.sendGain.gain.value = d.send;
                var out;
                if (d.bed) {
                    out = this.gain;
                } else {
                    this.panner = ctx.createPanner();
                    this.panner.panningModel = 'HRTF';
                    this.panner.distanceModel = 'inverse';
                    this.panner.refDistance = d.refDistance;
                    this.panner.rolloffFactor = d.rolloffFactor;
                    this.panner.maxDistance = d.maxDistance;
                    this.gain.connect(this.panner);
                    out = this.panner;
                }
                this.srcNode.connect(this.gain);
                out.connect(this.system.dry);
                out.connect(this.sendGain);
                this.sendGain.connect(this.system.reverbSend);
                this.srcNode.start();
            },
            tick: function () {
                if (!this.panner) return;
                this.el.object3D.getWorldPosition(this._pos);
                var t = this.system.ctx.currentTime;
                if (this.panner.positionX) {
                    this.panner.positionX.setTargetAtTime(this._pos.x, t, 0.02);
                    this.panner.positionY.setTargetAtTime(this._pos.y, t, 0.02);
                    this.panner.positionZ.setTargetAtTime(this._pos.z, t, 0.02);
                } else {
                    this.panner.setPosition(this._pos.x, this._pos.y, this._pos.z);
                }
            },
            remove: function () {
                if (this.srcNode) { try { this.srcNode.stop(); } catch (e) { } }
            }
        });


        AFRAME.registerComponent('tone-source', {
            schema: {
                freq: { default: 110 }, type: { default: 'sine' }, volume: { default: 0.12 },
                send: { default: 0.9 }, refDistance: { default: 1.5 }, rolloffFactor: { default: 2 }
            },
            init: function () {
                var self = this;
                this._pos = new THREE.Vector3();
                var sys = this.system = this.el.sceneEl.systems.acoustics;
                sys.whenReady(function (ctx) {
                    self.osc = ctx.createOscillator();
                    self.osc.type = self.data.type;
                    self.osc.frequency.value = self.data.freq;
                    self.gain = ctx.createGain();
                    self.gain.gain.value = self.data.volume;
                    self.panner = ctx.createPanner();
                    self.panner.panningModel = 'HRTF';
                    self.panner.distanceModel = 'inverse';
                    self.panner.refDistance = self.data.refDistance;
                    self.panner.rolloffFactor = self.data.rolloffFactor;
                    self.sendGain = ctx.createGain();
                    self.sendGain.gain.value = self.data.send;
                    self.osc.connect(self.gain);
                    self.gain.connect(self.panner);
                    self.panner.connect(sys.dry);
                    self.panner.connect(self.sendGain);
                    self.sendGain.connect(sys.reverbSend);
                    self.osc.start();
                });
            },
            tick: function () {
                if (!this.panner) return;
                this.el.object3D.getWorldPosition(this._pos);
                var t = this.system.ctx.currentTime;
                if (this.panner.positionX) {
                    this.panner.positionX.setTargetAtTime(this._pos.x, t, 0.02);
                    this.panner.positionY.setTargetAtTime(this._pos.y, t, 0.02);
                    this.panner.positionZ.setTargetAtTime(this._pos.z, t, 0.02);
                } else {
                    this.panner.setPosition(this._pos.x, this._pos.y, this._pos.z);
                }
            },
            remove: function () {
                if (this.osc) { try { this.osc.stop(); } catch (e) { } }
            }
        });


        AFRAME.registerComponent('hue-cycle', {
            schema: {
                speed: { default: 0.015 }, offset: { default: 0 },
                saturation: { default: 0.85 }, lightness: { default: 0.65 }
            },
            init: function () { this._c = new THREE.Color(); this._last = 0; },
            tick: function (time) {
                if (time - this._last < 150) return;
                this._last = time;
                var h = (time * this.data.speed / 1000 + this.data.offset) % 1;
                this._c.setHSL(h, this.data.saturation, this.data.lightness);
                this.el.setAttribute('light', 'color', '#' + this._c.getHexString());
            }
        });


        AFRAME.registerComponent('random-material', {
            init: function () {
                this.el.setAttribute('material', {
                    color: this.getRandomColor(),
                    metalness: Math.random(),
                    roughness: Math.random()
                });
            },
            getRandomColor: function () {
                var letters = '0123456789ABCDEF'.split('');
                var color = '#';
                for (var i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
                return color;
            }
        });

        AFRAME.registerComponent('random-torus-knot', {
            init: function () {
                this.el.setAttribute('geometry', {
                    primitive: 'torusKnot',
                    radius: 6 + Math.random() * 18,
                    radiusTubular: 0.3 + Math.random() * 1.2,
                    p: Math.round(Math.random() * 10),
                    q: Math.round(Math.random() * 10)
                });
                this.el.setAttribute('animation__yoyo',
                    'property: rotation; dir: alternate; dur: 10000; easing: easeInOutSine; loop: true; to: 360 360 360'
                );
            }
        });
    </script>
</head>

<body>
    <div id="audio-gate">tap anywhere to begin<br><br>&#127911; headphones or headset recommended</div>

    <a-scene acoustics>

        <a-assets>
            <a-mixin id="teleport"
                blink-controls="cameraRig: #cameraRig; teleportOrigin: #camera; snapTurn: false; collisionEntities: #floor; maxLength: 300"></a-mixin>
            <a-mixin id="light" geometry="primitive: sphere; radius: 5" material="color: #FFF; shader: flat"
                light="color: #DDDDFF; distance: 500; intensity: 1.2; type: point"></a-mixin>
            <a-mixin id="torusKnot" random-torus-knot random-material
                random-position="min: -160 30 -160; max: 160 180 160"></a-mixin>

            <audio id="atmos" src="assets/sound/true2.wav" preload="auto"></audio>

            <a-asset-item id="stand" src="assets/models/head2/scene.gltf"></a-asset-item>
            <a-asset-item id="hallway" src="assets/models/cave.glb"></a-asset-item>
        </a-assets>

        <a-plane id="floor" rotation="-90 0 0" width="4000" height="4000" position="0 0 0" visible="false"></a-plane>

        <!-- ============ ACOUSTIC SPACES ============ -->
        <a-entity
            reverb-zone="ambient: true; wet: 0.22; seconds: 2.6; decay: 3; tone: 4000; predelay: 0.07"></a-entity>
        <a-entity position="-5 8 28"
            reverb-zone="radius: 40; fade: 16; wet: 0.9; seconds: 6.5; decay: 2; tone: 2000; predelay: 0.06"></a-entity>
        <a-entity position="0 6 -12"
            reverb-zone="radius: 12; fade: 6; wet: 0.7; seconds: 2.4; decay: 1.8; tone: 3600; predelay: 0.025"></a-entity>

        <!-- ============ SOUND SOURCES ============ -->
        <a-entity spatial-source="src: #atmos; bed: true; volume: 0.3; send: 0.25"></a-entity>
        <a-entity position="-5 6 36"
            tone-source="freq: 82.4; type: triangle; volume: 0.1; send: 0.9; refDistance: 6"></a-entity>

        <a-entity entity-generator="mixin: torusKnot; num: 15"></a-entity>

        <!-- orbiting hue-cycling lights -->
        <a-entity animation="property: rotation; to: 0 0 360; dur: 16000; easing: linear; loop: true">
            <a-entity mixin="light" hue-cycle="offset: 0" position="120 0 0"></a-entity>
        </a-entity>
        <a-entity animation="property: rotation; to: 360 0 0; dur: 16000; easing: linear; loop: true">
            <a-entity mixin="light" hue-cycle="offset: 0.5" position="0 0 160"></a-entity>
        </a-entity>

        <!-- ============ PSYCHEDELIC MUSHROOM ENVIRONMENT — 8x ============ -->
        <a-entity scale="8 8 8" environment="preset: forest; fog: 0;
                               ground: hills; groundYScale: 3;
                               groundColor: #5b1a72; groundColor2: #ff5ec4;
                               groundTexture: walkernoise;
                               skyType: gradient; skyColor: #ff9de2; horizonColor: #3c0a5e;
                               flatShading: true;
                               dressing: mushrooms; dressingAmount: 100;
                               dressingScale: 4; dressingColor: #b03fff;
                               dressingVariance: 18 8 18;
                               dressingOnPlayArea: 0.1;
                               playArea: 2"></a-entity>

        <!-- ============ SCATTERED INSTANCED HEADS ============
             40 copies of #stand, each with its own spin/breathe/bob/size.
             Tune:
               count      — how many (push higher; it's cheap)
               height     — avg head height in world units (MEASURED sizing)
               heightVar  — size spread (0.5 = ±50%)
               spin       — max |Y spin| deg/sec (varies per head, ± direction)
               breatheAmp — max scale pulsing
               bob        — max vertical float, world units
               areaMin/areaMax — the volume they scatter through
             The gltf-model attr does the loading; scatter-instances
             turns the loaded mesh into instances. -->
        <a-entity gltf-model="#stand"
            scatter-instances="count: 80; height: 24; heightVar: 0.5; spin: 40;
                               breatheAmp: 0.5; bob: 6;
                               areaMin: -150 6 -150; areaMax: 600 90 600" funky-transform></a-entity>

        <!-- cave -->
        <a-gltf-model src="#hallway" scale="60 60 60" position="5 -1 28" animation-mixer></a-gltf-model>

        <!-- camera rig -->
        <a-entity id="cameraRig" position="0 0.1 0">
            <a-entity id="camera" camera position="0 1.6 0" wasd-controls="acceleration: 220" look-controls></a-entity>
            <a-entity id="rightHand" mixin="teleport" laser-controls="hand: right"></a-entity>
            <a-entity id="leftHand" mixin="teleport" laser-controls="hand: left"></a-entity>
        </a-entity>
    </a-scene>
</body>

</html>
